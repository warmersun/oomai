<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MONITORING THE SITUATION — EmTech Dashboard</title>
  <meta name="description"
    content="Real-time emerging technology monitoring dashboard with trend analysis, milestone tracking, and AI intelligence.">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════ DESIGN SYSTEM ═══════════════════════════════ */
    :root {
      --bg-primary: #06060c;
      --bg-secondary: #0d0d18;
      --bg-panel: rgba(13, 15, 30, 0.85);
      --bg-panel-hover: rgba(20, 24, 50, 0.95);
      --border: rgba(100, 220, 255, 0.08);
      --border-active: rgba(0, 212, 255, 0.3);
      --text-primary: #e0e6ed;
      --text-secondary: #7a8ca0;
      --text-muted: #4a5568;
      --accent-cyan: #00d4ff;
      --accent-green: #00ff88;
      --accent-amber: #ffa500;
      --accent-red: #ff4757;
      --accent-purple: #a855f7;
      --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.15);
      --glow-green: 0 0 20px rgba(0, 255, 136, 0.15);
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════ HEADER ═══════════════════════════════ */
    .header {
      position: relative;
      z-index: 10;
      padding: 24px 32px 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .header-title::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-cyan), transparent);
    }

    .header-status {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent-green);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ═══════════════════════════════ TAB BAR ═══════════════════════════════ */
    .tab-bar-wrapper {
      position: relative;
      z-index: 10;
      padding: 20px 32px 0 32px;
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-bar-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border-active);
      background: rgba(13, 15, 30, 0.92);
      backdrop-filter: blur(8px);
      color: var(--accent-cyan);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 20;
      transition: all 0.25s ease;
      opacity: 0;
      pointer-events: none;
    }

    .tab-bar-arrow.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .tab-bar-arrow:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--accent-cyan);
      box-shadow: var(--glow-cyan);
    }

    .tab-bar-arrow.left {
      left: 8px;
    }

    .tab-bar-arrow.right {
      right: 8px;
    }

    /* Fade edges when scrollable */
    .tab-bar-wrapper.can-scroll-left .tab-bar {
      mask-image: linear-gradient(to right, transparent 0px, black 32px, black 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0px, black 32px, black 100%);
    }

    .tab-bar-wrapper.can-scroll-right .tab-bar {
      mask-image: linear-gradient(to left, transparent 0px, black 32px, black 100%);
      -webkit-mask-image: linear-gradient(to left, transparent 0px, black 32px, black 100%);
    }

    .tab-bar-wrapper.can-scroll-left.can-scroll-right .tab-bar {
      mask-image: linear-gradient(to right, transparent 0px, black 32px, calc(100% - 32px), transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0px, black 32px, calc(100% - 32px), transparent 100%);
    }

    .tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab:hover {
      background: var(--bg-panel-hover);
      color: var(--text-primary);
      border-color: var(--border-active);
    }

    .tab.active {
      background: var(--bg-secondary);
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: var(--glow-cyan);
    }

    .tab-icon {
      font-size: 1rem;
    }

    /* ═══════════════════════════════ SEARCH BAR ═══════════════════════════════ */
    .search-bar {
      position: relative;
      z-index: 10;
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-bar input:focus {
      border-color: var(--accent-cyan);
      box-shadow: var(--glow-cyan);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .search-bar-btn {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-cyan);
      background: rgba(0, 212, 255, 0.08);
      color: var(--accent-cyan);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .search-bar-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      box-shadow: var(--glow-cyan);
    }

    .search-bar-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .search-bar-btn.clear {
      border-color: var(--border);
      color: var(--text-secondary);
      background: transparent;
    }

    .search-bar-btn.clear:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .search-active-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    /* ═══════════════════════════════ LAYOUT ═══════════════════════════════ */
    .dashboard {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto auto auto;
      gap: 16px;
      padding: 0 32px 32px 32px;
    }

    .panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .panel:hover {
      border-color: rgba(100, 220, 255, 0.15);
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .panel-body {
      padding: 20px;
    }

    /* Chart panel spans full width on left */
    .chart-panel {
      grid-column: 1;
      grid-row: 1 / 4;
      min-height: 500px;
    }

    .chart-container {
      position: relative;
      height: 380px;
      padding: 16px;
    }

    /* Trend explorer layout */
    .trend-explorer {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .trend-list-area {
      width: 260px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: 440px;
    }

    .trend-spot-input {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }

    .trend-spot-input input {
      flex: 1;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .trend-spot-input input:focus {
      border-color: var(--accent-cyan);
    }

    .trend-spot-input input::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .trend-spot-btn {
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-purple);
      background: rgba(168, 85, 247, 0.1);
      color: var(--accent-purple);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .trend-spot-btn:hover {
      background: rgba(168, 85, 247, 0.2);
    }

    .trend-spot-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .trend-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-cyan) transparent;
    }

    .trend-list-item {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .trend-list-item:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    .trend-list-item.active {
      background: rgba(0, 212, 255, 0.08);
      border-left: 2px solid var(--accent-cyan);
    }

    .trend-list-icon {
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .trend-list-name {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .trend-list-item:hover .trend-list-name {
      color: var(--text-primary);
    }

    .trend-count {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
    }

    .chart-main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Doubling rate badge */
    .doubling-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.25);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--accent-green);
      font-weight: 600;
    }

    .doubling-badge.low-confidence {
      background: rgba(255, 165, 0, 0.08);
      border-color: rgba(255, 165, 0, 0.25);
      color: var(--accent-amber);
    }

    /* Trend detail popup (inside the chart area) */
    .trend-detail-card {
      margin: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border-active);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.4);
    }

    .trend-detail-name {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--accent-cyan);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .trend-detail-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .trend-detail-meta {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .trend-detail-meta span {
      display: inline-block;
      margin-right: 16px;
    }

    .trend-detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .trend-action-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .trend-action-btn.primary {
      border: 1px solid var(--accent-green);
      background: rgba(0, 255, 136, 0.1);
      color: var(--accent-green);
    }

    .trend-action-btn.primary:hover {
      background: rgba(0, 255, 136, 0.2);
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
    }

    .trend-action-btn.secondary {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
    }

    .trend-action-btn.secondary:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .trend-action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Spotted trend result */
    .spotted-result {
      margin: 12px 16px;
      padding: 14px 18px;
      border: 1px solid var(--accent-purple);
      border-radius: var(--radius);
      background: rgba(168, 85, 247, 0.06);
    }

    .spotted-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--accent-purple);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .spotted-name {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .spotted-desc {
      font-size: 0.76rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .spotted-evidence {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .spotted-evidence li {
      margin-bottom: 3px;
    }

    .save-trend-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-green);
      background: rgba(0, 255, 136, 0.1);
      color: var(--accent-green);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .save-trend-btn:hover {
      background: rgba(0, 255, 136, 0.2);
    }

    .save-trend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .save-trend-btn.saved {
      border-color: var(--text-muted);
      color: var(--text-muted);
      background: transparent;
    }

    /* ═══════════════════════════════ BETS PANEL ═══════════════════════════════ */
    .bets-panel {
      grid-column: 2;
      grid-row: 1;
      max-height: 500px;
      display: flex;
      flex-direction: column;
    }

    .bets-panel .panel-body {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-cyan) transparent;
    }

    .bet-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.3);
      transition: all 0.25s ease;
      cursor: default;
    }

    .bet-card:hover {
      border-color: var(--border-active);
      background: rgba(0, 212, 255, 0.03);
    }

    .bet-status {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      padding: 3px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .bet-status.pending {
      background: rgba(255, 165, 0, 0.15);
      color: var(--accent-amber);
    }

    .bet-status.validated {
      background: rgba(0, 255, 136, 0.15);
      color: var(--accent-green);
    }

    .bet-status.invalidated {
      background: rgba(255, 71, 87, 0.15);
      color: var(--accent-red);
    }

    .bet-name {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .bet-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bet-date {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-top: 6px;
    }

    .bet-evaluate-btn {
      margin-top: 8px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-cyan);
      background: rgba(0, 212, 255, 0.08);
      color: var(--accent-cyan);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      width: 100%;
    }

    .bet-evaluate-btn:hover {
      background: rgba(0, 212, 255, 0.18);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.12);
    }

    .bet-evaluate-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .bet-evaluate-btn.evaluating {
      animation: scan-pulse 1.5s ease-in-out infinite;
    }

    .bet-eval-result {
      margin-top: 10px;
      padding: 12px 14px;
      border: 1px solid var(--border-active);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.35);
      display: none;
    }

    .bet-eval-result.visible {
      display: block;
    }

    /* ═══════════════════════════════ IDEAS PANEL ═══════════════════════════════ */
    .ideas-panel {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      max-height: 280px;
    }

    .ideas-panel .panel-body {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-cyan) transparent;
    }

    .idea-card {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .idea-card:hover {
      border-color: rgba(168, 85, 247, 0.4);
      background: rgba(168, 85, 247, 0.05);
      transform: translateX(3px);
    }

    .idea-card-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .idea-card-desc {
      font-size: 0.72rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .idea-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 0.62rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .idea-card-check {
      color: var(--accent-purple);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .idea-card:hover .idea-card-check {
      opacity: 1;
    }

    .idea-type-badge {
      font-size: 0.58rem;
      font-family: var(--font-mono);
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .idea-type-badge.idea {
      background: rgba(168, 85, 247, 0.2);
      color: var(--accent-purple);
    }

    .idea-type-badge.bet {
      background: rgba(255, 165, 0, 0.2);
      color: var(--accent-amber);
    }

    /* Check button in modal */
    .check-btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-green);
      background: rgba(0, 255, 136, 0.1);
      color: var(--accent-green);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .check-btn:hover {
      background: rgba(0, 255, 136, 0.2);
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
    }

    .check-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ═══════════════════════════════ NEWS PANEL ═══════════════════════════════ */
    .news-panel {
      grid-column: 2;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      max-height: 360px;
    }

    .news-panel .panel-body {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-cyan) transparent;
    }

    .scan-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-cyan);
      background: rgba(0, 212, 255, 0.08);
      color: var(--accent-cyan);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .scan-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      box-shadow: var(--glow-cyan);
    }

    .scan-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .scan-btn.scanning {
      animation: scan-pulse 1.5s ease-in-out infinite;
    }

    @keyframes scan-pulse {

      0%,
      100% {
        border-color: var(--accent-cyan);
      }

      50% {
        border-color: var(--accent-amber);
      }
    }

    /* News item cards */
    .news-item {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
    }

    .news-item:hover {
      border-color: var(--accent-cyan);
      background: rgba(0, 212, 255, 0.05);
      transform: translateX(3px);
    }

    .news-item:active {
      transform: translateX(1px);
    }

    .news-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .news-item-headline {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
    }

    .news-item-sig {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .news-item-sig.high {
      background: rgba(255, 71, 87, 0.2);
      color: var(--accent-red);
    }

    .news-item-sig.medium {
      background: rgba(255, 165, 0, 0.2);
      color: var(--accent-amber);
    }

    .news-item-sig.low {
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent-cyan);
    }

    .news-item-summary {
      font-size: 0.72rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-item-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      font-size: 0.62rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .news-item-analyze {
      color: var(--accent-cyan);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .news-item:hover .news-item-analyze {
      opacity: 1;
    }

    /* Analysis content in modal */
    .analysis-content {
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .analysis-content h1,
    .analysis-content h2,
    .analysis-content h3 {
      font-family: var(--font-mono);
      color: var(--accent-cyan);
      margin: 16px 0 8px 0;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .analysis-content h1:first-child,
    .analysis-content h2:first-child,
    .analysis-content h3:first-child {
      margin-top: 0;
    }

    .analysis-content strong {
      color: var(--accent-green);
    }

    .analysis-content ul,
    .analysis-content ol {
      padding-left: 20px;
    }

    .analysis-content li {
      margin-bottom: 4px;
    }

    .analysis-content a {
      color: var(--accent-cyan);
      text-decoration: none;
    }

    .analysis-content a:hover {
      text-decoration: underline;
    }

    .news-content {
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .news-content strong {
      color: var(--accent-green);
    }

    .news-placeholder {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .news-placeholder .radar-icon {
      font-size: 2rem;
      margin-bottom: 10px;
      display: block;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ═══════════════════════════════ MODAL ═══════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-active);
      border-radius: var(--radius);
      max-width: 800px;
      width: 92%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.1);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .modal-section-content {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .modal-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      margin: 3px 4px 3px 0;
      border: 1px solid var(--border);
    }

    .modal-tag.ptc {
      border-color: rgba(168, 85, 247, 0.3);
      color: var(--accent-purple);
      background: rgba(168, 85, 247, 0.08);
    }

    .modal-tag.lac {
      border-color: rgba(0, 255, 136, 0.3);
      color: var(--accent-green);
      background: rgba(0, 255, 136, 0.08);
    }

    .modal-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent-amber);
    }

    /* ═══════════════════════════════ LOADING ═══════════════════════════════ */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* ═══════════════════════════════ EMPTY STATE ═══════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    /* ═══════════════════════════════ SCROLLBAR ═══════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.4);
    }

    /* ═══════════════════════════════ RESPONSIVE ═══════════════════════════════ */
    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
      }

      .chart-panel {
        grid-column: 1;
        grid-row: 1;
      }

      .bets-panel {
        grid-column: 1;
        grid-row: 2;
        max-height: none;
      }

      .ideas-panel {
        grid-column: 1;
        grid-row: 3;
        max-height: none;
      }

      .news-panel {
        grid-column: 1;
        grid-row: 4;
        max-height: none;
      }

      .header {
        padding: 16px;
      }

      .tab-bar-wrapper {
        padding: 12px 16px 0 16px;
      }

      .search-bar {
        padding: 8px 16px;
      }

      .dashboard {
        padding: 0 16px 16px 16px;
      }
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="header">
    <h1 class="header-title">Monitoring the Situation</h1>
    <div class="header-status">
      <span class="status-dot"></span>
      <span id="status-text">INITIALIZING…</span>
    </div>
  </header>

  <!-- ═══════════════════════════════ TAB BAR ═══════════════════════════════ -->
  <div class="tab-bar-wrapper" id="tab-bar-wrapper">
    <button class="tab-bar-arrow left" id="tab-arrow-left" onclick="scrollTabs(-1)">‹</button>
    <nav class="tab-bar" id="tab-bar">
      <!-- Populated by JS -->
    </nav>
    <button class="tab-bar-arrow right" id="tab-arrow-right" onclick="scrollTabs(1)">›</button>
  </div>

  <!-- ═══════════════════════════════ SEARCH BAR ═══════════════════════════════ -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 Search ideas, trends, and predictions…"
      onkeydown="if(event.key==='Enter') performSearch()">
    <button class="search-bar-btn" id="search-btn" onclick="performSearch()">🗺️ Map</button>
    <button class="search-bar-btn clear" id="search-clear-btn" onclick="clearSearch()" style="display:none">✕
      Clear</button>
    <span id="search-badge" style="display:none"></span>
  </div>

  <!-- ═══════════════════════════════ DASHBOARD ═══════════════════════════════ -->
  <main class="dashboard">
    <!-- Chart Panel -->
    <section class="panel chart-panel">
      <div class="panel-header">
        <span class="panel-title" id="chart-title">📊 Trend Explorer</span>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span id="doubling-info"></span>
          <span style="font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted);">LOG SCALE</span>
        </div>
      </div>
      <div class="trend-explorer">
        <!-- Left: trend list -->
        <div class="trend-list-area">
          <div class="trend-spot-input">
            <input type="text" id="spot-input" placeholder="Spot a trend…"
              onkeydown="if(event.key==='Enter') spotTrend()">
            <button class="trend-spot-btn" id="spot-btn" onclick="spotTrend()">🔭 Spot</button>
          </div>
          <div class="trend-count" id="trend-count"></div>
          <div class="trend-scroll" id="trend-list">
            <!-- Populated by JS -->
          </div>
        </div>
        <!-- Right: chart or detail -->
        <div class="chart-main-area">
          <div class="chart-container" id="chart-area">
            <canvas id="main-chart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- Bets Panel -->
    <section class="panel bets-panel">
      <div class="panel-header">
        <span class="panel-title">🎯 Active Bets</span>
        <span id="bet-count" style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);"></span>
      </div>
      <div class="panel-body" id="bets-container">
        <div class="empty-state">Select an EmTech to track bets</div>
      </div>
    </section>

    <!-- Ideas Panel -->
    <section class="panel ideas-panel">
      <div class="panel-header">
        <span class="panel-title">💡 Ideas & Assessments</span>
        <span id="idea-count"
          style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted);"></span>
      </div>
      <div class="panel-body" id="ideas-container">
        <div class="empty-state">Select an EmTech to view ideas</div>
      </div>
    </section>

    <!-- News Panel -->
    <section class="panel news-panel">
      <div class="panel-header">
        <span class="panel-title">📡 Latest Intel</span>
        <button class="scan-btn" id="scan-btn" onclick="scanNews()" disabled>
          ⚡ Scan X
        </button>
      </div>
      <div class="panel-body" id="news-container">
        <div class="news-placeholder">
          <span class="radar-icon">📡</span>
          Select an EmTech and click Scan X to gather intelligence
        </div>
      </div>
    </section>
  </main>

  <!-- ═══════════════════════════════ MILESTONE MODAL ═══════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modal-title">Milestone</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ JAVASCRIPT ═══════════════════════════════ -->
  <script>
    // ═══════════════════════════════ STATE ═══════════════════════════════
    let currentEmTech = null;
    let mainChart = null;
    let milestonesData = [];
    let trendsData = [];
    let ideasData = [];
    let currentTrend = null;
    let searchActive = false;

    // ═══════════════════════════════ COLORS PER EMTECH ═══════════════════════════════
    const EMTECH_COLORS = {
      'artificial intelligence': '#a855f7',
      'robots': '#f43f5e',
      'computing': '#06b6d4',
      'energy': '#eab308',
      'crypto-currency': '#f59e0b',
      'networks': '#3b82f6',
      'transportation': '#10b981',
      '3D printing': '#ec4899',
      'internet of things': '#8b5cf6',
      'virtual reality': '#14b8a6',
      'synthetic biology': '#84cc16',
    };

    // ═══════════════════════════════ INIT ═══════════════════════════════
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      try {
        const res = await fetch('/api/emtechs');
        const emtechs = await res.json();
        renderTabs(emtechs);
        document.getElementById('status-text').textContent = `ONLINE — ${emtechs.length} EMTECHS`;

        // Select first tab
        if (emtechs.length > 0) {
          selectEmTech(emtechs[0].name);
        }
      } catch (err) {
        console.error('Init failed:', err);
        document.getElementById('status-text').textContent = 'CONNECTION LOST';
        document.querySelector('.status-dot').style.background = '#ff4757';
      }
    }

    // ═══════════════════════════════ TABS ═══════════════════════════════
    function renderTabs(emtechs) {
      const bar = document.getElementById('tab-bar');
      bar.innerHTML = emtechs.map(e => `
    <div class="tab" data-name="${e.name}" onclick="selectEmTech('${e.name}')">
      <span class="tab-icon">${e.icon}</span>
      ${e.name}
    </div>
  `).join('');
      initTabScroll();
    }

    function initTabScroll() {
      const bar = document.getElementById('tab-bar');
      bar.addEventListener('scroll', updateTabArrows);
      window.addEventListener('resize', updateTabArrows);
      // Run after a tick so tabs are rendered
      requestAnimationFrame(updateTabArrows);
    }

    function updateTabArrows() {
      const bar = document.getElementById('tab-bar');
      const wrapper = document.getElementById('tab-bar-wrapper');
      const leftArr = document.getElementById('tab-arrow-left');
      const rightArr = document.getElementById('tab-arrow-right');
      const canScrollLeft = bar.scrollLeft > 2;
      const canScrollRight = bar.scrollLeft < bar.scrollWidth - bar.clientWidth - 2;

      leftArr.classList.toggle('visible', canScrollLeft);
      rightArr.classList.toggle('visible', canScrollRight);
      wrapper.classList.toggle('can-scroll-left', canScrollLeft);
      wrapper.classList.toggle('can-scroll-right', canScrollRight);
    }

    function scrollTabs(direction) {
      const bar = document.getElementById('tab-bar');
      bar.scrollBy({ left: direction * 200, behavior: 'smooth' });
    }

    async function selectEmTech(name) {
      currentEmTech = name;
      currentTrend = null;

      // Clear search on tab switch
      clearSearch();

      // Update active tab
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.name === name);
      });

      // Update chart title
      document.getElementById('chart-title').textContent = `📊 ${name.toUpperCase()} — TREND EXPLORER`;
      document.getElementById('scan-btn').disabled = false;
      document.getElementById('doubling-info').innerHTML = '';
      document.getElementById('spot-input').value = '';

      // Load data in parallel
      showBetsLoading();
      showIdeasLoading();
      document.getElementById('trend-list').innerHTML = `
        <div class="loading-container" style="padding:30px">
          <div class="loading-spinner"></div>
        </div>
      `;

      const chartArea = document.getElementById('chart-area');
      chartArea.innerHTML = '<div class="empty-state">📈 Select a trend or spot a new one</div>';

      const [trends, bets, ideas] = await Promise.all([
        fetchJSON(`/api/emtech/${encodeURIComponent(name)}/trends`),
        fetchJSON(`/api/emtech/${encodeURIComponent(name)}/bets`),
        fetchJSON(`/api/emtech/${encodeURIComponent(name)}/ideas`),
      ]);

      trendsData = trends;
      ideasData = ideas;
      renderTrendList(trends);
      renderBets(bets);
      renderIdeas(ideas);
    }

    async function fetchJSON(url) {
      try {
        const res = await fetch(url);
        return await res.json();
      } catch (err) {
        console.error(`Fetch ${url} failed:`, err);
        return [];
      }
    }

    // ═══════════════════════════════ TREND LIST ═══════════════════════════════
    function renderTrendList(trends) {
      const listEl = document.getElementById('trend-list');
      const countEl = document.getElementById('trend-count');

      if (!trends || trends.length === 0) {
        countEl.textContent = '0 TRENDS';
        listEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:0.72rem;">No trends observed yet.<br>Use the input above to spot one!</div>';
        return;
      }

      // Deduplicate
      const seen = new Set();
      const unique = trends.filter(t => {
        if (seen.has(t.name)) return false;
        seen.add(t.name);
        return true;
      });
      window._uniqueTrends = unique;

      countEl.textContent = `${unique.length} TRENDS`;
      listEl.innerHTML = unique.map((t, idx) =>
        `<div class="trend-list-item" data-idx="${idx}" onclick="openTrendDetail(${idx})">
           <span class="trend-list-icon">📈</span>
           <span class="trend-list-name">${escapeHtml(t.name)}</span>
         </div>`
      ).join('');
    }

    function openTrendDetail(idx) {
      const trend = window._uniqueTrends[idx];
      if (!trend) return;

      currentTrend = trend;

      // Highlight in list
      document.querySelectorAll('.trend-list-item').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      // Show detail card in chart area
      const chartArea = document.getElementById('chart-area');
      document.getElementById('doubling-info').innerHTML = '';
      if (mainChart) { mainChart.destroy(); mainChart = null; }

      chartArea.innerHTML = `
        <div class="trend-detail-card">
          <div class="trend-detail-name">📈 ${escapeHtml(trend.name)}</div>

    async function visualizeSpottedTrend(mpd) {
      // For spotted trends, we don't have milestones from KG yet,
      // so we draw a pure exponential projection from today
      const chartArea = document.getElementById('chart-area');
      chartArea.innerHTML = '<div class="chart-container"><canvas id="main-chart"></canvas></div>';
      const container = chartArea.querySelector('.chart-container');
      container.style.height = '350px';

      // Show doubling rate badge
      const doublingInfoEl = document.getElementById('doubling-info');
      doublingInfoEl.innerHTML = `<span class="doubling-badge">⚡ ${mpd} mo/doubling</span>`;

      // Draw exponential from today, 36 months forward
      const startDate = new Date();
      const trendLinePoints = [];
      const totalMonths = 36;

      for (let i = 0; i <= 40; i++) {
        const t = (i / 40) * totalMonths;
        const date = new Date(startDate.getTime() + t * 30.44 * 24 * 60 * 60 * 1000);
        const y = Math.pow(2, t / mpd);
        trendLinePoints.push({ x: date, y });
      }

      // Add OOM markers
      const oomPoints = [10, 100, 1000].map(target => {
        const t = Math.log2(target) * mpd;
        const date = new Date(startDate.getTime() + t * 30.44 * 24 * 60 * 60 * 1000);
        return { x: date, y: target, name: `${target}× (${Math.round(t)} months)` };
      }).filter(p => (p.x - startDate) / (1000 * 60 * 60 * 24 * 30) <= totalMonths + 1);

      const maxY = trendLinePoints[trendLinePoints.length - 1].y * 1.2;

      if (mainChart) mainChart.destroy();
      mainChart = new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [
            {
              label: `📈 Projection (${mpd}mo doubling)`,
              data: trendLinePoints,
              borderColor: '#00ff8866',
              backgroundColor: 'rgba(0, 255, 136, 0.03)',
              borderWidth: 2,
              borderDash: [8, 4],
              pointRadius: 0, pointHitRadius: 0,
              fill: true, showLine: true, tension: 0,
            },
            ...(oomPoints.length > 0 ? [{
              label: '🎯 OOM targets',
              data: oomPoints,
              borderColor: 'transparent',
              backgroundColor: color + 'cc',
              pointBackgroundColor: color,
              pointBorderColor: '#fff',
              pointBorderWidth: 2,
              pointRadius: 8, pointHoverRadius: 12,
              showLine: false,
            }] : []),
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#7a8ca0', font: { family: "'JetBrains Mono', monospace", size: 10 }, boxWidth: 12, padding: 12 } },
            tooltip: {
              backgroundColor: 'rgba(6,6,12,0.95)', titleColor: '#00d4ff', bodyColor: '#e0e6ed',
              borderColor: 'rgba(0,212,255,0.3)', borderWidth: 1, padding: 12, cornerRadius: 8,
              callbacks: {
                title: items => { const d = items[0]; return d.raw?.name || ''; },
                label: item => new Date(item.parsed.x).toLocaleDateString('en-US', { year: 'numeric', month: 'short' }),
              },
              filter: item => item.datasetIndex === 1,
            },
          },
          scales: {
            x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'MMM yyyy' } }, grid: { color: 'rgba(100,220,255,0.04)' }, ticks: { color: '#4a5568', font: { family: "'JetBrains Mono', monospace", size: 9 }, maxTicksLimit: 10 }, title: { display: true, text: 'TIMELINE', color: '#4a5568', font: { family: "'JetBrains Mono', monospace", size: 10, weight: 600 } } },
            y: { type: 'logarithmic', min: 0.8, max: maxY, grid: { color: 'rgba(100,220,255,0.04)' }, ticks: { color: '#4a5568', font: { family: "'JetBrains Mono', monospace", size: 9 }, callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v >= 1 ? Math.round(v) + '\u00d7' : '' }, title: { display: true, text: 'GROWTH (LOG)', color: '#4a5568', font: { family: "'JetBrains Mono', monospace", size: 10, weight: 600 } } },

    function showChartLoading() {
      if (mainChart) { mainChart.destroy(); mainChart = null; }
      const chartArea = document.getElementById('chart-area');
      chartArea.innerHTML = `

    function renderTrendChart(data) {
      const chartArea = document.getElementById('chart-area');
      chartArea.innerHTML = '<div class="chart-container" style="height:380px;"><canvas id="main-chart"></canvas></div>';
      const ctx = document.getElementById('main-chart').getContext('2d');

      const { trend, milestones, doubling } = data;
      const mpd = doubling?.months_per_doubling || 12;
      const color = EMTECH_COLORS[currentEmTech] || '#00d4ff';

      // Show doubling rate badge
      const doublingInfoEl = document.getElementById('doubling-info');
      const confClass = doubling?.confidence === 'low' ? 'low-confidence' : '';
      doublingInfoEl.innerHTML = `
    <span class="doubling-badge ${confClass}" title="${escapeHtml(doubling?.reasoning || '')}">
      ⚡ ${mpd} mo/doubling · ${escapeHtml(doubling?.metric || 'capability')}
    </span>
  `;

      // Prepare milestone data points
      const dated = milestones.filter(m => m.date).sort((a, b) => new Date(a.date) - new Date(b.date));

      if (dated.length === 0) {
        chartArea.innerHTML = '<div class="empty-state">No dated milestones for this trend\'s capabilities</div>';
        return;
      }

      // Assign cumulative milestone index as y-value (represents cumulative progress)
      const msPoints = dated.map((m, i) => ({
        x: new Date(m.date),
        y: i + 1,
        name: m.name,
      }));

      const datasets = [];

      // Dataset 1: Milestone dots
      datasets.push({
        label: '🏁 Milestones',
        data: msPoints,
        borderColor: 'transparent',
        backgroundColor: color + 'cc',
        pointBackgroundColor: color,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 7,
        pointHoverRadius: 11,
        pointHitRadius: 14,
        showLine: false,
        order: 1,
      });

      // Dataset 2: Exponential trend line
      // On a log-scale chart, exponential growth = straight line
      // y(t) = y0 * 2^(t/mpd), where t is months from start
      const startDate = msPoints[0].x;
      const endDate = new Date(Math.max(
        msPoints[msPoints.length - 1].x.getTime(),
        Date.now()
      ));
      // Extrapolate 18 months into the future
      const futureDate = new Date(endDate);
      futureDate.setMonth(futureDate.getMonth() + 18);

      const y0 = 1; // Start at 1
      const trendLinePoints = [];
      const totalMonths = (futureDate - startDate) / (1000 * 60 * 60 * 24 * 30.44);
      const steps = Math.min(80, Math.max(20, Math.ceil(totalMonths)));

      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * totalMonths; // months from start
        const date = new Date(startDate.getTime() + t * 30.44 * 24 * 60 * 60 * 1000);
        const y = y0 * Math.pow(2, t / mpd);
        trendLinePoints.push({ x: date, y: y });
      }

      datasets.push({
        label: `📈 Trend (${mpd}mo doubling)`,
        data: trendLinePoints,
        borderColor: '#00ff8866',
        backgroundColor: 'rgba(0, 255, 136, 0.03)',
        borderWidth: 2,
        borderDash: [8, 4],
        pointRadius: 0,
        pointHitRadius: 0,
        fill: true,
        showLine: true,
        tension: 0,
        order: 2,
      });

      // Find max y for the chart
      const maxMilestoneY = msPoints[msPoints.length - 1].y;
      const maxTrendY = trendLinePoints[trendLinePoints.length - 1].y;
      const maxY = Math.max(maxMilestoneY, maxTrendY) * 1.2;

      mainChart = new Chart(ctx, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'nearest',
            intersect: true,
          },
          onClick: (event, elements) => {
            if (elements.length > 0) {
              const el = elements[0];
              const ds = datasets[el.datasetIndex];
              const pt = ds.data[el.index];
              if (pt && pt.name) {
                openMilestoneModal(pt.name);
              }
            }
          },
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#7a8ca0',
                font: { family: "'JetBrains Mono', monospace", size: 10 },
                boxWidth: 12,
                boxHeight: 12,
                padding: 16,
              }
            },
            tooltip: {
              backgroundColor: 'rgba(6, 6, 12, 0.95)',
              titleColor: '#00d4ff',
              bodyColor: '#e0e6ed',
              borderColor: 'rgba(0, 212, 255, 0.3)',
              borderWidth: 1,
              titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
              bodyFont: { family: "'Inter', sans-serif", size: 12 },
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                title: (items) => {
                  const ds = datasets[items[0].datasetIndex];
                  const pt = ds.data[items[0].dataIndex];
                  return pt?.name || ds.label;
                },
                label: (item) => {
                  const d = new Date(item.parsed.x);
                  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                },
                afterLabel: (item) => {
                  const ds = datasets[item.datasetIndex];
                  if (ds.label === '🏁 Milestones') return '🔍 Click for details';
                  return '';
                }
              },
              filter: (item) => {
                // Don't show tooltips for trend line points
                return datasets[item.datasetIndex].label === '🏁 Milestones';
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: {
                unit: 'month',
                displayFormats: { month: 'MMM yyyy' }
              },
              grid: {
                color: 'rgba(100, 220, 255, 0.04)',
                lineWidth: 1,
              },
              ticks: {
                color: '#4a5568',
                font: { family: "'JetBrains Mono', monospace", size: 9 },
                maxTicksLimit: 12,
              },
              title: {
                display: true,
                text: 'TIMELINE',
                color: '#4a5568',
                font: { family: "'JetBrains Mono', monospace", size: 10, weight: 600 },
              }
            },
            y: {
              type: 'logarithmic',
              min: 0.5,
              max: maxY,
              grid: {
                color: 'rgba(100, 220, 255, 0.04)',
                lineWidth: 1,
              },
              ticks: {
                color: '#4a5568',
                font: { family: "'JetBrains Mono', monospace", size: 9 },
                callback: (val) => {
                  if (val >= 1000) return (val / 1000).toFixed(0) + 'k';
                  if (val >= 1) return Math.round(val);
                  return '';
                },
              },
              title: {
                display: true,
                text: 'CUMULATIVE MILESTONES (LOG)',
                color: '#4a5568',
                font: { family: "'JetBrains Mono', monospace", size: 10, weight: 600 },
              }
            }
          }
        }
      });
    }

    function generateColors(n) {
      const base = [
        '#06b6d4', '#a855f7', '#f43f5e', '#10b981', '#3b82f6',
        '#ec4899', '#eab308', '#8b5cf6', '#14b8a6', '#f59e0b',
        '#84cc16', '#e879f9', '#22d3ee', '#fb923c', '#4ade80',
      ];
      const out = [];
      for (let i = 0; i < n; i++) out.push(base[i % base.length]);
      return out;
    }

      }
    }

    // ═══════════════════════════════ SEARCH ═══════════════════════════════
    async function performSearch() {
      const input = document.getElementById('search-input');
      const btn = document.getElementById('search-btn');
      const clearBtn = document.getElementById('search-clear-btn');
      const badge = document.getElementById('search-badge');
      const query = input.value.trim();

      if (!query || !currentEmTech) return;

      btn.disabled = true;
      btn.textContent = '⏳…';
      searchActive = true;

      // Show loading in trends and ideas
      document.getElementById('trend-list').innerHTML = `
        <div class="loading-container" style="padding:30px">
          <div class="loading-spinner"></div>
          <div class="loading-text">SEARCHING…</div>
        </div>
      `;
      showIdeasLoading();

      try {
        const res = await fetch('/api/map', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, emtech: currentEmTech }),
        });
        const data = await res.json();

        if (data.detail) {
          document.getElementById('trend-list').innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(data.detail)}</div>`;
          document.getElementById('ideas-container').innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(data.detail)}</div>`;
          return;
        }

        // Update trends list with search results
        const searchTrends = (data.trends || []).map(t => ({
          name: t.name,
          description: t.description,
          score: t.score,
        }));
        renderTrendList(searchTrends);
        document.getElementById('trend-count').textContent = `${searchTrends.length} MATCHING TRENDS`;

        // Update ideas list with search results
        renderIdeas(data.ideas || []);
        document.getElementById('idea-count').textContent = `${(data.ideas || []).length} MATCHING`;

        // Show search badge and clear button
        clearBtn.style.display = '';
        badge.style.display = '';
        badge.innerHTML = `<span class="search-active-badge">🔍 "${escapeHtml(query)}"</span>`;

      } catch (err) {
        document.getElementById('trend-list').innerHTML = `<div class="empty-state">⚠️ Search failed: ${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🗺️ Map';
      }
    }

    function clearSearch() {
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('search-clear-btn');
      const badge = document.getElementById('search-badge');

      input.value = '';
      clearBtn.style.display = 'none';
      badge.style.display = 'none';
      searchActive = false;

      // Restore original data if we have it
      if (currentEmTech) {
        renderTrendList(trendsData);
        renderIdeas(ideasData);
      }
    }

    // ═══════════════════════════════ BETS ═══════════════════════════════
    function showBetsLoading() {
      document.getElementById('bets-container').innerHTML = `
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">LOADING BETS…</div>
    </div>
  `;
    }

    function renderBets(bets) {
      const container = document.getElementById('bets-container');
      const countEl = document.getElementById('bet-count');

      if (!bets || bets.length === 0) {
        container.innerHTML = '<div class="empty-state">No active bets for this sector</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = `${bets.length} TRACKED`;

      container.innerHTML = bets.map((b, idx) => {
        const hasValidation = b.validations?.some(v => v.milestone);
        const hasInvalidation = b.invalidations?.some(v => v.source);
        let status, statusClass;
        if (b.result) {
          status = b.result.toLowerCase().includes('invalid') ? '❌ INVALIDATED' : '✅ VALIDATED';
          statusClass = b.result.toLowerCase().includes('invalid') ? 'invalidated' : 'validated';
        } else if (hasValidation) {
          status = '✅ SIGNAL VALIDATED';
          statusClass = 'validated';
        } else if (hasInvalidation) {
          status = '❌ SIGNAL AGAINST';
          statusClass = 'invalidated';
        } else {
          status = '⏳ PENDING';
          statusClass = 'pending';
        }

        const desc = b.description || '';
        const truncDesc = desc.length > 200 ? desc.slice(0, 200) + '…' : desc;

        return `
      <div class="bet-card">
        <span class="bet-status ${statusClass}">${status}</span>
        <div class="bet-name">${escapeHtml(b.name)}</div>
        <div class="bet-desc">${escapeHtml(truncDesc)}</div>
        ${b.placed_date ? `<div class="bet-date">Placed: ${b.placed_date}</div>` : ''}
        <button class="bet-evaluate-btn" id="bet-eval-btn-${idx}" onclick="evaluateBet('${escapeAttr(b.name)}', ${idx})">🔍 Evaluate</button>
        <div class="bet-eval-result" id="bet-eval-result-${idx}"></div>
      </div>
    `;
      }).join('');
    }

    async function evaluateBet(name, idx) {
      const btn = document.getElementById(`bet-eval-btn-${idx}`);
      const resultEl = document.getElementById(`bet-eval-result-${idx}`);

      btn.disabled = true;
      btn.classList.add('evaluating');
      btn.textContent = '⏳ Evaluating…';
      resultEl.classList.add('visible');
      resultEl.innerHTML = `
    <div class="loading-container" style="padding:16px;">
      <div class="loading-spinner"></div>
      <div class="loading-text">EVALUATING BET…<br>Querying KG + searching web & X<br>This may take 30-60 seconds</div>
    </div>
  `;

      try {
        const res = await fetch('/api/bet/evaluate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bet_name: name, emtech: currentEmTech }),
        });
        const data = await res.json();

        if (data.content) {
          resultEl.innerHTML = `<div class="analysis-content">${markdownToHtml(data.content)}</div>`;
          btn.textContent = '✅ Evaluated';
        } else if (data.detail) {
          resultEl.innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(data.detail)}</div>`;
          btn.textContent = '🔍 Evaluate';
          btn.disabled = false;
        }
      } catch (err) {
        resultEl.innerHTML = `<div class="empty-state">⚠️ Evaluation failed: ${escapeHtml(err.message)}</div>`;
        btn.textContent = '🔍 Evaluate';
        btn.disabled = false;
      } finally {
        btn.classList.remove('evaluating');
      }
    }

    // ═══════════════════════════════ NEWS ═══════════════════════════════
    let newsItems = []; // cached news items for analysis

    async function scanNews() {
      if (!currentEmTech) return;
      const btn = document.getElementById('scan-btn');
      const container = document.getElementById('news-container');

      btn.disabled = true;
      btn.classList.add('scanning');
      btn.textContent = '⏳ SCANNING…';

      container.innerHTML = `
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">SCANNING X AND WEB…<br>This may take 15-30 seconds</div>
    </div>
  `;

      try {
        const res = await fetch('/api/news', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ emtech: currentEmTech }),
        });
        const data = await res.json();

        if (data.items && data.items.length > 0) {
          newsItems = data.items;
          renderNewsItems(data.items);
        } else if (data.raw_content) {
          // Fallback: display raw markdown if JSON parse failed
          container.innerHTML = `<div class="news-content">${markdownToHtml(data.raw_content)}</div>`;
        } else if (data.detail) {
          container.innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(data.detail)}</div>`;
        } else {
          container.innerHTML = '<div class="empty-state">No news found for this sector</div>';
        }
      } catch (err) {
        container.innerHTML = `<div class="empty-state">⚠️ Scan failed: ${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.classList.remove('scanning');
        btn.textContent = '⚡ Scan X';
      }
    }

    function renderNewsItems(items) {
      const container = document.getElementById('news-container');
      container.innerHTML = items.map((item, idx) => {
        const sig = (item.significance || 'medium').toLowerCase();
        return `
      <div class="news-item" onclick="analyzeNewsItem(${idx})">
        <div class="news-item-header">
          <div class="news-item-headline">${escapeHtml(item.headline)}</div>
          <span class="news-item-sig ${sig}">${sig}</span>
        </div>
        <div class="news-item-summary">${escapeHtml(item.summary)}</div>
        <div class="news-item-meta">
          <span>${escapeHtml(item.source || '')}${item.date ? ' · ' + item.date : ''}</span>
          <span class="news-item-analyze">ANALYZE →</span>
        </div>
      </div>
    `;
      }).join('');
    }

    async function analyzeNewsItem(idx) {
      const item = newsItems[idx];
      if (!item) return;

      const overlay = document.getElementById('modal-overlay');
      const titleEl = document.getElementById('modal-title');
      const bodyEl = document.getElementById('modal-body');

      titleEl.textContent = `🔍 ${item.headline}`;
      bodyEl.innerHTML = `
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">DEEP ANALYSIS IN PROGRESS…<br>Querying knowledge graph + X/web<br>This may take 30-60 seconds</div>
    </div>
  `;
      overlay.classList.add('visible');

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            headline: item.headline,
            summary: item.summary || '',
            emtech: currentEmTech,
          }),
        });
        const data = await res.json();

        if (data.content) {
          titleEl.textContent = `🔍 Analysis: ${item.headline}`;
          bodyEl.innerHTML = `<div class="analysis-content">${markdownToHtml(data.content)}</div>`;
        } else if (data.detail) {
          bodyEl.innerHTML = `<div class="empty-state">⚠️ ${escapeHtml(data.detail)}</div>`;
        }
      } catch (err) {
        bodyEl.innerHTML = `<div class="empty-state">⚠️ Analysis failed: ${escapeHtml(err.message)}</div>`;
      }
    }

    // ═══════════════════════════════ MODAL ═══════════════════════════════
    async function openMilestoneModal(name) {
      const overlay = document.getElementById('modal-overlay');
      const titleEl = document.getElementById('modal-title');
      const bodyEl = document.getElementById('modal-body');

      titleEl.textContent = '⏳ Loading…';
      bodyEl.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div></div>';
      overlay.classList.add('visible');

      try {
        const data = await fetchJSON(`/api/milestone/${encodeURIComponent(name)}`);

        titleEl.textContent = `🏁 ${data.name}`;

        let html = '';

        // Date
        if (data.date) {
          html += `<div class="modal-section">
        <div class="modal-section-title">Date Reached</div>
        <div class="modal-date">${data.date}</div>
      </div>`;
        }

        // Description
        html += `<div class="modal-section">
      <div class="modal-section-title">Description</div>
      <div class="modal-section-content">${escapeHtml(data.description || 'No description')}</div>
    </div>`;

        // Capabilities
        if (data.capabilities?.length) {
          const caps = data.capabilities.filter(c => c.name);
          if (caps.length) {
            html += `<div class="modal-section">
          <div class="modal-section-title">Capability</div>
          <div class="modal-section-content">${caps.map(c =>
              `<strong>${escapeHtml(c.name)}</strong>: ${escapeHtml(c.description || '')}`
            ).join('<br>')}</div>
        </div>`;
          }
        }

        // Reached by (PTCs)
        if (data.reached_by?.length) {
          const ptcs = data.reached_by.filter(p => p.name);
          if (ptcs.length) {
            html += `<div class="modal-section">
          <div class="modal-section-title">Reached By</div>
          <div>${ptcs.map(p =>
              `<span class="modal-tag ptc">${escapeHtml(p.name)}${p.release_date ? ' · ' + p.release_date : ''}</span>`
            ).join('')}</div>
        </div>`;
          }
        }

        // Unlocks (LACs)
        if (data.unlocks?.length) {
          const lacs = data.unlocks.filter(l => l.name);
          if (lacs.length) {
            html += `<div class="modal-section">
          <div class="modal-section-title">Unlocks</div>
          <div>${lacs.map(l =>
              `<span class="modal-tag lac">${escapeHtml(l.name)}</span>`
            ).join('')}</div>
          <div class="modal-section-content" style="margin-top:8px">${lacs.filter(l => l.description).map(l =>
              `<strong>${escapeHtml(l.name)}</strong>: ${escapeHtml(l.description)}`
            ).join('<br>')}</div>
        </div>`;
          }
        }

        bodyEl.innerHTML = html || '<div class="empty-state">No additional details</div>';
      } catch (err) {
        bodyEl.innerHTML = `<div class="empty-state">⚠️ Failed to load details</div>`;
      }
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    // ═══════════════════════════════ UTILS ═══════════════════════════════
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function markdownToHtml(md) {
      if (!md) return '';
      return md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        // headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // bold & italic
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        // unordered lists
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        // numbered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // wrap consecutive <li> in <ul>
        .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
        // line breaks
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>

commands:
  capture:
    icon: database
    description: "capture in KG"
    template: |
      **Task**: Process the conversation and capture it in the knowledge graph.
      First gather context and avoid duplicates. Then create the right concepts and relationships.
      Use `create_node` and `create_edge` tools when needed.
      The **emphasis** is on what the user is asking:
      {user_input}
  
  xarticle:
    icon: file-text
    description: "Turn our entire prior discussion into a polished long-form X Article (not a thread)"
    template: |
      **Task**: Turn our entire prior discussion (the full conversation history) into a high-quality, native **X Article**.

      **Important clarification**:
      - An **X Article** is a long-form, standalone article published directly on X (formerly Twitter) in the "Articles" tab.
      - It is **NOT** a tweet thread. It is one rich, fully formatted piece of writing (typically 1,500–4,000+ words) that supports headings, bold, italics, bullet points, blockquotes, images, etc.
      - Think of it as a proper essay or thought-leadership article that lives on X and can be read comfortably in one place.

      **Requirements**:
      - Give it a compelling, specific title (use # for the main title).
      - Write in a clear, engaging, insightful voice — like a sharp colleague sharing deep thinking.
      - Use proper markdown formatting throughout (headings, subheadings, bold, italics, lists, blockquotes).
      - Do **not** use any tables. Use conversational markdown instead.
      - Synthesize everything important from our full conversation into a coherent, flowing narrative. Do not just summarize chronologically — create real insight and value.
      - Structure it beautifully: strong introduction, logical sections with clear headings, and a thoughtful conclusion.
      - Highlight key ideas, trends, predictions, bets, and conclusions from our discussion.
      - Make it original and polished — something people would actually want to read and share on X.
      - Do **not** include any call-to-action at the end.

      Here is the complete conversation history and all context you must use:

      {user_input}

      Now write the full X Article.      

  research:
    icon: search
    description: "run multi-agent Grok research"
    template: |
      **Task**: Run a focused multi-agent research pass using the `multi_agent_research` tool before drafting your final answer.
      - This tool uses the 16-agent setup by default for deep research.
      - Return a structured synthesis with citations and clearly separated findings vs conclusions.

      User request:
      {user_input}

  trend:
    icon: trending-up
    description: "Spot a trend related to..."
    template: |
      Query the knowledge graph for capabilities and milestones related to {user_input}. 
      Look at milestones over time. Look at new capabilities emerging and the use cases they unlock. 
      Identify the trend and capture it in the knowledge graph.
      Trends are explanations of what we observe.
      Checklist for Validating Explanations:
      - **Hard to Vary (Core Criterion)**: Is the explanation tightly constrained by the problem it addresses? Can you easily alter details (e.g., swap gods in a myth or arbitrary parameters) without changing its predictions or fit? Good explanations resist such variations; bad ones allow many equivalent variants.
      - **Explanatory Depth**: Does it explain *why* things are as they are in reality, beyond mere predictions or descriptions? It should address underlying mechanisms, not just patterns or "what happens." Avoids being a rule of thumb or prediction without interpretation.
      - **Testability and Falsifiability**: Does it make specific, risky predictions that could be refuted by observation or experiment? Mere compatibility with data isn't enough; it must be refutable in principle.
      - **Avoids Induction and Empiricism Flaws**: Does it rely on "deriving" from repeated experiences or assuming the future resembles the past without explanation? Good explanations are conjectural, not induced; they use experience to test, not source, ideas.
      - **Fallibilism and Criticism**: Acknowledges potential flaws and invites criticism? It shouldn't claim certainty or justification from authority; knowledge is tentative and improvable.
      - **Objective Reality Focus**: Describes what is *really* out there (e.g., stars as nuclear furnaces, not just dots in the sky)? Rejects instrumentalism (explanations as mere tools for prediction) and relativism (no objective truth).
      - **No Parochialism or Anthropocentrism**: Avoids narrow, human-centered assumptions (e.g., the universe is tuned for us) without broader explanatory power. Considers cosmic-scale reach and universality.
      - **Logical Consistency and No Fallacies**: Free from fallacies like justificationism (seeking authority for truth), relativism (truth is subjective), or bad philosophy (e.g., supernatural appeals without testability)?
      - **Reach and Universality**: Does it have broad implications or apply universally? Good explanations often jump to universality, explaining more than intended without ad-hoc adjustments.
      - **Creativity and Progress Potential**: Originates from conjecture and criticism? Contributes to unbounded knowledge growth, not stagnation?
      If you spot an exponential trend then use the `visualize_oom` tool to show when we can expect the next orders of magnitude in development.

  check:
    icon: check-check
    description: "Check if the prediction is valid:"
    template: |
      start by gathering data:
      1. Search the knowledge graph for an idea or trend related to {user_input}
      2. Do a breadth-first search on those trends or ideas.
      3. Look for related product categories (LTC), capabilities, milestones, use cases (LAC), products (PTC), implementations, solutions (PAC).
      Then, structure your response:
      - 🧐 **Validity Check** — Check if the prediction is valid.
      - 🔮 **Future Outlook** — If the prediction is valid, finish with what to expect going forward.
      - 📉 **Reasoning** — If the prediction is not valid, finish with why it is not valid.

  map:
    icon: map
    description: "Map ideas, and predictions to..."
    template: |
      Find ideas and trends related to {user_input}
      Start by gathering data:
      1. Find ideas
      2. Do a breadth-first search on those ideas.
      3. Find trends
      4. For trends: 
      - what is the timeline of milestones that we are observing?  
      - for those milestones what were similar applications (LAC, PAC), use cases (LAC)?
      - with what  products (PTC), in what product categories (LTC) were these milestones reached?
      - what next milestones do the trends predict?
      
      Then, structure your response:
      - 📈 **Observed Trends** — What are the trends that we are observing? Contrast the observations with the predictions, give credits to the parties that have made the predictions.
      - ⚖️ **Alignment Check** — Evaluate if the spotted trends are in line with the ideas, predictions.
      - 🔮 **Future Outlook** — If the predictions are indeed valid, finish with what to expect going forward.

  tool:
    icon: wrench
    description: "find toolset for:"
    template: |
      Find toolset for {user_input}
      Work backwards. Start by gathering data:
      1. Find LAC, and PAC 
      2. Then traverse the knowledge graph back to capabilities, LTC, PTC and EmTech.
      
      Then, structure your response.

  gaps:
    icon: search
    description: "Find gaps in thinking about..."
    template: |
      Perform a structural gap analysis on the knowledge graph related to {user_input}.

      1. Search the knowledge graph for all Ideas, Bets, Trends, and Capabilities related to {user_input}.
      2. For each Bet found, check:
         - Does it have DEPENDS_ON edges to Capabilities and Milestones?
         - Are there any VALIDATES or INVALIDATES edges from recent Milestones?
         - Are there known blindspots mentioned in the Bet's description that have no corresponding Ideas exploring them?
      3. For each Idea/Assessment found, check:
         - Does it have `argument`, `assumptions`, and `counterargument` properties filled in?
         - Are there related Ideas that might contradict it?
         - Does it PLACE any Bets?
      4. Look for Capabilities that have no associated Ideas or Bets — these are areas where the user hasn't formed a position yet.

      Structure your response:
      - 🕳️ **Gaps found** — areas where thinking is incomplete or missing
      - 💡 **Suggested positions** — questions the user should be forming opinions on
      - 🔗 **Missing connections** — relationships that should probably exist but don't

  stale:
    icon: clock
    description: "Find stale assessments about..."
    template: |
      Find assessments and bets in the knowledge graph related to {user_input} that may be outdated.

      1. Search for Ideas (assessments) and Bets related to {user_input}.
      2. For Bets, look at the `placed_date` — if older than 6 months and no `result` property, flag them.
      3. For Ideas with `assumptions` — search the web for recent developments that might invalidate those assumptions.
      4. Look for Milestones that were reached after relevant Bets were placed — do they VALIDATE or INVALIDATE the bet?

      Structure your response:
      - ⏰ **Stale bets** — bets placed long ago that haven't been revisited
      - 🔄 **Assumptions to recheck** — assumptions that may no longer hold given recent developments
      - ✅ **Recently validated** — positions that recent evidence supports

  validate:
    icon: check-circle
    description: "Validate bet about..."
    template: |
      Validate the following bet against current evidence: {user_input}

      1. Find the Bet in the knowledge graph (or the closest match using `find_node`).
      2. Review its description for the thesis, validation signals, invalidation signals, and blindspots.
      3. Check existing VALIDATES and INVALIDATES edges — what evidence already exists?
      4. Search the web and X for the latest developments related to this bet's thesis.
      5. Compare what the web says against the validation/invalidation signals listed in the bet.

      Structure your response:
      - 📊 **Current evidence** — what the latest data says
      - 🎯 **Bet thesis** — the original position
      - ✅ **Validating signals** — evidence supporting the bet
      - ❌ **Invalidating signals** — evidence challenging the bet
      - 🔮 **Updated assessment** — should this bet be maintained, revised, or closed?

  contradict:
    icon: alert-triangle
    description: "Find contradictions in thinking about..."
    template: |
      Find contradictions and tensions in existing positions related to {user_input}.

      1. Search the knowledge graph for all Ideas, Bets, and Trends related to {user_input}.
      2. Compare Ideas against each other — do any assessments contradict one another?
      3. Check if any Bets depend on Capabilities or Milestones that other Ideas suggest are unlikely.
      4. Look for Trends that point in opposite directions.
      5. Search for Ideas where the `counterargument` property raises points that other Ideas treat as assumptions.

      Structure your response:
      - ⚔️ **Direct contradictions** — positions that can't both be true
      - 🤔 **Tensions** — positions that are in tension but not necessarily contradictory
      - 🧩 **Reconciliation** — ways to resolve or at least acknowledge the contradictions
